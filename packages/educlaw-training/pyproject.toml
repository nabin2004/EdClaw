[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "educlaw-training"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "transformers>=4.46",
  "peft>=0.13",
  "trl>=0.12",
  "datasets>=3.1",
  "accelerate>=1.1",
]

[tool.setuptools.packages.find]
where = ["src"]
