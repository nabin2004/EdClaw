name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy src/educlaw
      - name: Pytest
        run: pytest -q
      - name: Doctor (offline)
        run: educlaw doctor --offline
        env:
          EDUCLAW_PROFILE_PATH: ${{ github.workspace }}/profiles/local.toml
